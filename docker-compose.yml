services:
  postgres:
    image: postgres:17-alpine
    container_name: erp_postgres
    restart: unless-stopped
    shm_size: 128mb
    mem_limit: 256m
    cpus: "0.35"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erp_app}
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio}
      POSTGRES_ORIGEM_DB: ${POSTGRES_ORIGEM_DB:-erp_origem}
    command:
      - postgres
      - -c
      - max_connections=20
      - -c
      - shared_buffers=64MB
      - -c
      - effective_cache_size=256MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - wal_buffers=4MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    ports:
      # Disponibiliza o banco apenas no host da VPS para acesso via túnel SSH.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: distribuidoradealimentos-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: erp_backend
    restart: unless-stopped
    init: true
    mem_limit: 384m
    cpus: "0.50"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-erp_app}
      DB_USER: ${POSTGRES_USER:-erp_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio}
      DB_ORIGEM_HOST: postgres
      DB_ORIGEM_PORT: 5432
      DB_ORIGEM_NAME: ${POSTGRES_ORIGEM_DB:-erp_origem}
      DB_ORIGEM_USER: ${POSTGRES_USER:-erp_user}
      DB_ORIGEM_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD obrigatorio}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-jwt-secret-key-minimum-32-characters-long}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-your-jwt-refresh-secret-key-minimum-32-characters}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: "*"
      CORS_ALLOW_CREDENTIALS: "true"
      APP_NAME: "Distribuidora de Alimentos API"
      APP_VERSION: "1.0.0"
      APP_DESCRIPTION: "API da Distribuidora de Alimentos"
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: info
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: distribuidoradealimentos-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: erp_frontend
    restart: unless-stopped
    init: true
    mem_limit: 96m
    cpus: "0.25"
    expose:
      - "80"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: erp_nginx
    restart: unless-stopped
    mem_limit: 64m
    cpus: "0.10"
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
