services:
  backend:
    image: erp_sabordaterra-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: erp_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ORIGEM_HOST: ${DB_ORIGEM_HOST:-${DB_HOST}}
      DB_ORIGEM_PORT: ${DB_ORIGEM_PORT:-${DB_PORT:-5432}}
      DB_ORIGEM_NAME: ${DB_ORIGEM_NAME:-${DB_NAME}}
      DB_ORIGEM_USER: ${DB_ORIGEM_USER:-${DB_USER}}
      DB_ORIGEM_PASSWORD: ${DB_ORIGEM_PASSWORD:-${DB_PASSWORD}}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-jwt-secret-key-minimum-32-characters-long}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-your-jwt-refresh-secret-key-minimum-32-characters}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: "*"
      CORS_ALLOW_CREDENTIALS: "true"
      APP_NAME: "ERP Sabor da Terra API"
      APP_VERSION: "1.0.0"
      APP_DESCRIPTION: "API do ERP Sabor da Terra"
      ENVIRONMENT: development
      DEBUG: "false"
      LOG_LEVEL: info
    expose:
      - "8000"

  frontend:
    image: erp_sabordaterra-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: erp_frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: erp_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
