# Deploy: configure no repositório GitHub → Settings → Secrets and variables → Actions:
# DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
# DB_ORIGEM_HOST, DB_ORIGEM_PORT, DB_ORIGEM_NAME, DB_ORIGEM_USER, DB_ORIGEM_PASSWORD
# (JWT_SECRET_KEY / JWT_REFRESH_SECRET_KEY opcionais — senão usa defaults do docker-compose)

name: Deploy ERP Sabor da Terra (via TAR)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build do frontend (validação prévia)
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Criar .env para o servidor (secrets)
        run: |
          {
            echo "DB_HOST=${{ secrets.DB_HOST }}"
            echo "DB_PORT=${{ secrets.DB_PORT }}"
            echo "DB_NAME=${{ secrets.DB_NAME }}"
            echo "DB_USER=${{ secrets.DB_USER }}"
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
            echo "DB_ORIGEM_HOST=${{ secrets.DB_ORIGEM_HOST }}"
            echo "DB_ORIGEM_PORT=${{ secrets.DB_ORIGEM_PORT }}"
            echo "DB_ORIGEM_NAME=${{ secrets.DB_ORIGEM_NAME }}"
            echo "DB_ORIGEM_USER=${{ secrets.DB_ORIGEM_USER }}"
            echo "DB_ORIGEM_PASSWORD=${{ secrets.DB_ORIGEM_PASSWORD }}"
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}"
            echo "JWT_REFRESH_SECRET_KEY=${{ secrets.JWT_REFRESH_SECRET_KEY }}"
          } > .env

      - name: Build das Imagens Docker
        run: |
          docker compose build --no-cache backend
          docker compose build --no-cache frontend

      - name: Exportar Imagens para .tar
        run: |
          docker save -o backend.tar erp_sabordaterra-backend:latest
          docker save -o frontend.tar erp_sabordaterra-frontend:latest

      - name: Enviar arquivos .tar (nginx/ e docker-compose.yml)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "backend.tar,frontend.tar,.env,nginx,docker-compose.yml"
          target: "/root/lewio-deploy/"

      - name: Executar Comandos de Atualização no Servidor (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -euxo pipefail

            echo "== Diagnóstico =="
            whoami
            pwd
            docker --version
            (docker compose version || true)
            (docker-compose version || true)

            echo "== Conteúdo /root/lewio-deploy =="
            ls -la /root/lewio-deploy
            ls -la /root/lewio-deploy/nginx || true

            # 1. Carga das novas imagens
            test -f /root/lewio-deploy/backend.tar
            test -f /root/lewio-deploy/frontend.tar
            docker load -i /root/lewio-deploy/backend.tar
            docker load -i /root/lewio-deploy/frontend.tar

            # 2. Subida da stack usando docker compose
            cd /root/lewio-deploy
            test -f ./docker-compose.yml
            test -f ./nginx/nginx.conf

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "ERRO: docker compose não está instalado na VPS."
              exit 1
            fi

            $COMPOSE up -d --no-build --force-recreate --remove-orphans

            # 3. Limpeza de arquivos temporários para poupar disco
            rm -f /root/lewio-deploy/backend.tar /root/lewio-deploy/frontend.tar
