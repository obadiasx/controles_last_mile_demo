# Deploy: configure no repositório GitHub → Settings → Secrets and variables → Actions:
# SSH_HOST, SSH_USER, SSH_KEY, SSH_PORT
# POSTGRES_PASSWORD
# (JWT_SECRET_KEY / JWT_REFRESH_SECRET_KEY opcionais — senão usa defaults do docker-compose)

name: Deploy Distribuidora de Alimentos (Oracle VPS)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: /home/ubuntu/distribuidoradealimentos
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build do frontend (validação prévia)
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Criar .env para o servidor
        run: |
          {
            echo "POSTGRES_DB=erp_app"
            echo "POSTGRES_ORIGEM_DB=erp_origem"
            echo "POSTGRES_USER=erp_user"
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
            echo "JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}"
            echo "JWT_REFRESH_SECRET_KEY=${{ secrets.JWT_REFRESH_SECRET_KEY }}"
          } > .env

      - name: Build das Imagens Docker
        run: |
          docker compose build --no-cache backend
          docker compose build --no-cache frontend

      - name: Exportar Imagens para .tar
        run: |
          docker save -o backend.tar distribuidoradealimentos-backend:latest
          docker save -o frontend.tar distribuidoradealimentos-frontend:latest

      - name: Enviar arquivos .tar e configuração
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "backend.tar,frontend.tar,.env,nginx,docker,docker-compose.yml"
          target: ${{ env.DEPLOY_PATH }}

      - name: Executar Comandos de Atualização no Servidor (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -euxo pipefail
            DEPLOY_PATH="/home/ubuntu/distribuidoradealimentos"

            echo "== Diagnóstico =="
            whoami
            pwd
            docker --version
            (docker compose version || true)
            (docker-compose version || true)

            echo "== Conteúdo ${DEPLOY_PATH} =="
            ls -la "${DEPLOY_PATH}"
            ls -la "${DEPLOY_PATH}/nginx" || true

            # 1. Carga das novas imagens
            test -f "${DEPLOY_PATH}/backend.tar"
            test -f "${DEPLOY_PATH}/frontend.tar"
            docker load -i "${DEPLOY_PATH}/backend.tar"
            docker load -i "${DEPLOY_PATH}/frontend.tar"

            # 2. Subida da stack usando docker compose
            cd "${DEPLOY_PATH}"
            test -f ./docker-compose.yml
            test -f ./nginx/nginx.conf
            test -f ./docker/postgres/init-multiple-databases.sh

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "ERRO: docker compose não está instalado na VPS."
              exit 1
            fi

            if ! sudo iptables -t filter -S DOCKER-FORWARD >/dev/null 2>&1; then
              echo "Chain DOCKER-FORWARD ausente; reiniciando Docker para recriar regras de rede."
              sudo systemctl restart docker
              sleep 5
              sudo iptables -t filter -S DOCKER-FORWARD >/dev/null
            fi

            $COMPOSE up -d --no-build --force-recreate --remove-orphans

            # 3. Limpeza de arquivos temporários para poupar disco
            rm -f "${DEPLOY_PATH}/backend.tar" "${DEPLOY_PATH}/frontend.tar"
            docker image prune -f
